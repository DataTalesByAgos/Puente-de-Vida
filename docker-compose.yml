services:
  db:
    image: postgres:16-alpine
    container_name: pdv-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdv_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-puente_de_vida}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdv} -d ${POSTGRES_DB:-puente_de_vida}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pdv-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pdv}:${POSTGRES_PASSWORD:-pdv_dev_password}@db:5432/${POSTGRES_DB:-puente_de_vida}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      # WhatsApp: vacío = modo demo emulado (gratis). Para activar un
      # proveedor real, configurá WHATSAPP_API_URL y WHATSAPP_API_KEY.
      # Compatible con Kapso, Meta Cloud API, 360dialog, WATI, etc.
      WHATSAPP_AUTO_REPLY: ${WHATSAPP_AUTO_REPLY:-true}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin123}
      ADMIN_ROLE: ${ADMIN_ROLE:-admin}
      WHATSAPP_WEBHOOK_SECRET: ${WHATSAPP_WEBHOOK_SECRET:-}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: pdv-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
